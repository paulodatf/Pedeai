<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Admin - Pede Aí</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: sans-serif; background: #f4f4f9; margin: 0; padding: 10px; }
        header { display: flex; align-items: center; gap: 15px; margin-bottom: 20px; }
        header a { text-decoration: none; color: #666; font-size: 14px; border: 1px solid #ccc; padding: 5px 10px; border-radius: 5px; }
        
        .admin-container { max-width: 600px; margin: 0 auto; }
        .card-admin { 
            background: white; border-radius: 8px; padding: 10px; margin-bottom: 15px;
            display: flex; gap: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); align-items: flex-start;
        }
        .foto-admin { width: 70px; height: 70px; object-fit: cover; border-radius: 5px; flex-shrink: 0; }
        .info-admin { flex-grow: 1; font-size: 13px; }
        .info-admin div { margin-bottom: 3px; }
        .titulo-admin { font-weight: bold; font-size: 15px; color: #333; }
        .badge { display: inline-block; padding: 2px 6px; border-radius: 4px; font-size: 10px; text-transform: uppercase; font-weight: bold; }
        .badge-pendente { background: #fff3cd; color: #856404; }
        .badge-aprovado { background: #d4edda; color: #155724; }
        .badge-rejeitado { background: #f8d7da; color: #721c24; }
        
        .acoes { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; margin-top: 10px; }
        .btn { border: none; padding: 8px; border-radius: 5px; font-size: 12px; cursor: pointer; font-weight: bold; text-align: center; text-decoration: none; }
        .btn-whats { background: #25d366; color: white; grid-column: 1 / -1; }
        .btn-aprovar { background: #28a745; color: white; }
        .btn-rejeitar { background: #ffc107; color: black; }
        .btn-excluir { background: #dc3545; color: white; grid-column: 1 / -1; margin-top: 5px; opacity: 0.8; }
    </style>
</head>
<body>
    <div class="admin-container">
        <header>
            <a href="anuncios.html">Voltar</a>
            <h2>Gerenciar Anúncios</h2>
        </header>

        <div class="card-admin" style="display: block; margin-bottom: 20px; background: #eef6ff; border: 1px solid #cce5ff;">
            <h3 style="margin: 0 0 10px 0; font-size: 15px; color: #0056b3;">Número Oficial dos Anúncios</h3>
            <p style="font-size: 12px; color: #666; margin: 0 0 10px 0;">Se preenchido, este número substituirá o botão de contato de todos os anúncios.</p>
            <div style="display: flex; gap: 10px;">
                <input type="text" id="inputNumeroGlobal" placeholder="Apenas números (Ex: 11999999999)" style="flex-grow: 1; padding: 8px; border: 1px solid #ccc; border-radius: 5px; font-size: 14px; outline: none;">
                <button onclick="window.salvarNumeroGlobal()" style="background: #0056b3; color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; font-weight: bold;">Salvar</button>
            </div>
        </div>

        <h2><i class="fas fa-list"></i> Todos os Anúncios</h2>
        <div id="listaAdmin">
            <p style="text-align:center; color:#666;">Carregando anúncios...</p>
        </div>
        
        <h2 style="color: #ea1d2c;"><i class="fas fa-bullhorn"></i> Denúncias</h2>
        <div id="listaDenuncias">
            <p style="text-align:center; color:#666;">Carregando denúncias...</p>
        </div>

        <hr style="border: 0; height: 1px; background: #ccc; margin: 40px 0 20px 0;">
        <h2 style="color: #0077ff;"><i class="fas fa-handshake"></i> 📞 CENTRAL DE INTERMEDIAÇÃO</h2>
        <div id="listaIntermediacao">
            <p style="text-align:center; color:#666;">Carregando intermediações...</p>
        </div>
    </div>
    <!-- Firebase Modular -->
    <script type="module" src="config.js"></script>
    <script type="module" src="adminanuncios.js"></script>
</body>
</html>
